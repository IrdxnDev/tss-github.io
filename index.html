    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);

            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('users')) db.createObjectStore('users', { keyPath: 'id' });

        });
    }
    
    async function getAllFromStore(storeName) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readonly');
            const request = tx.objectStore(storeName).getAll();
            request.onsuccess = () => resolve(request.result || []);
            request.onerror = () => reject(request.error);
        });
    }
    async function putToStore(storeName, item) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readwrite');
            const request = tx.objectStore(storeName).put(item);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }
    async function deleteFromStore(storeName, id) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readwrite');
            const request = tx.objectStore(storeName).delete(id);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    function showToast(msg) { 
        let t = document.createElement('div'); 
        t.className = 'toast';

        document.body.appendChild(t); 
        setTimeout(() => t.remove(), 3000); 
    }
    
    async function addNotification(userId, title, message) {
        let notif = { id: Date.now() + '_' + Math.random().toString(36).substr(2, 6), userId, title, message, read: false, createdAt: Date.now() };
        await putToStore('notifications', notif);
        notifications.push(notif);
        if (currentUser && currentUser.id === userId) { updateNotifBadge(); showToast(message); }
    }
    
    function updateNotifBadge() { 
        let badge = document.getElementById('notifBadge'); 
        if (badge && currentUser) { 
            let count = notifications.filter(n => n.userId === currentUser.id && !n.read).length; 
            badge.textContent = count || ''; 
            badge.style.display = count ? 'block' : 'none';
        }

    function formatLoc(loc) { 
        if (!loc) return '—';
        let parts = [];
        if (loc.station) parts.push('Станция: ' + loc.station);
        if (loc.line) parts.push('Линия: ' + loc.line);
        if (loc.path) parts.push('Путь: ' + loc.path);
        if (loc.km) parts.push('Км: ' + loc.km);
        return parts.join(' | ') || '—';
    }

    // ========== ГОЛОСОВАНИЕ ==========
    async function quickVote(photoId, val) {
        if (!currentUser) { alert('Войдите чтобы голосовать'); return; }
        if (!canUserVote(currentUser)) { alert('Голосование запрещено администратором'); return; }
        let photo = allPhotos.find(p => p.id === photoId);
        if (!photo) return;
        if (photo.userId === currentUser.id) { alert('Нельзя голосовать за своё фото'); return; }
        let existing = votes.find(v => v.photoId === photoId && v.userId === currentUser.id);
        if (existing) {
            if (existing.value === val) return;
            if (val === 1) { photo.likes++; if (existing.value === -1) photo.dislikes--; }
            else { photo.dislikes++; if (existing.value === 1) photo.likes--; }
            photo.rating += (val - existing.value);
            existing.value = val;
            await putToStore('votes', existing);
        } else {
            if (val === 1) photo.likes++;
            else photo.dislikes++;
            photo.rating += val;
            const newVote = { id: Date.now() + '_' + Math.random().toString(36).substr(2, 6), photoId, userId: currentUser.id, value: val };
            await putToStore('votes', newVote);
            votes.push(newVote);
        }
        await putToStore('photos', photo);
        refreshCurrentView();
    }
    
    // ========== МОДЕРАЦИЯ ==========
    async function moderatePhoto(id, status, note) {
        let photo = allPhotos.find(p => p.id === id);
        if (photo && canModerate(currentUser)) {
            photo.status = status;
            photo.moderationNote = note || '';
            await putToStore('photos', photo);
            
            let statusText = status === 'approved' ? 'Одобрено' : (status === 'conditional' ? 'Принято условно' : 'Отклонено');
            let msg = `Ваше фото "${photo.vehicle}" ${statusText.toLowerCase()}`;
            if (note) msg += `. Замечание: ${note}`;
            
            await addNotification(photo.userId, `Фото ${statusText}`, msg);
            showToast(`Фото ${statusText.toLowerCase()}`);
            if (window.currentView === 'admin') showAdminPanel();
            refreshCurrentView();
        }
    }

    async function deletePhoto(photoId) {
        if (!canModerate(currentUser)) return;
        if (confirm('Удалить это фото?')) {
            await deleteFromStore('photos', photoId);
            allPhotos = allPhotos.filter(p => p.id !== photoId);
            const toDelVotes = votes.filter(v => v.photoId === photoId);
            for (const v of toDelVotes) await deleteFromStore('votes', v.id);
            votes = votes.filter(v => v.photoId !== photoId);
            const toDelComments = comments.filter(c => c.photoId === photoId);
            for (const c of toDelComments) await deleteFromStore('comments', c.id);
            comments = comments.filter(c => c.photoId !== photoId);
            showToast('Фото удалено');
            refreshCurrentView();
        }
    }

    async function moderatePhotoWithNote(photoId, status, note) {
        let photo = allPhotos.find(p => p.id === photoId);
        if (photo && canModerate(currentUser)) {
            if (photo.status === 'approved' || photo.status === 'conditional') {
                photo.moderationNote = note || photo.moderationNote;
                await putToStore('photos', photo);
                showToast('Замечание обновлено');
                if (window.currentView === 'admin') showAdminPanel();
                refreshCurrentView();
                return;
            }
            photo.status = status;
            photo.moderationNote = note || '';
            await putToStore('photos', photo);
            
            let statusText = status === 'approved' ? 'Одобрено' : (status === 'conditional' ? 'Принято условно' : 'Отклонено');
            let msg = `Ваше фото "${photo.vehicle}" ${statusText.toLowerCase()}`;
            if (note) msg += `. Замечание: ${note}`;
            
            await addNotification(photo.userId, `Фото ${statusText}`, msg);
            showToast(`Фото ${statusText.toLowerCase()}`);
            if (window.currentView === 'admin') showAdminPanel();
            refreshCurrentView();
        }
    }
    
    // ========== КАРТА ==========
    function renderMap(containerId, lat, lng, zoom = 12) {
        setTimeout(() => {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            try {
                const map = L.map(containerId).setView([lat, lng], zoom);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);
                L.marker([lat, lng]).addTo(map);
                setTimeout(() => map.invalidateSize(), 200);
            } catch(e) { console.error('Ошибка карты:', e); }
        }, 150);
    }
    
    function showMapForPhoto(photoId) {
        let photo = allPhotos.find(p => p.id === photoId);
        if (!photo || !photo.loc || !photo.loc.lat || !photo.loc.lng) { alert('Координаты не указаны'); return; }
        let modal = document.createElement('div'); modal.className = 'edit-modal';
        modal.innerHTML = `<div><h3 style="font-size:1rem; color:#9a7acc;"><i class="fas fa-map-marked-alt"></i> Место съёмки: ${photo.vehicle}</h3><div class="map-container" id="mapModalContainer"></div><div style="text-align:center; margin-top:6px; font-size:0.85rem; color:#8870aa;">${photo.loc.station || '—'} | ${photo.loc.line || '—'}</div><div style="display:flex; justify-content:flex-end; margin-top:8px;"><button class="btn" onclick="this.closest('.edit-modal').remove()">Закрыть</button></div></div>`;
        document.body.appendChild(modal);
        setTimeout(() => renderMap('mapModalContainer', photo.loc.lat, photo.loc.lng, 13), 200);
    }
    
    // ========== КОММЕНТАРИИ ==========
    async function deleteComment(commentId) {
        let comment = comments.find(c => c.id === commentId);
        if (!comment) return;
        if (currentUser.id !== comment.userId && !canModerate(currentUser)) {
            alert('Вы не можете удалить этот комментарий');
            return;
        }
        if (confirm('Удалить комментарий?')) {
            await deleteFromStore('comments', commentId);
            comments = comments.filter(c => c.id !== commentId);
            showToast('Комментарий удалён');
            refreshCurrentView();
        }
    }

        if (window.currentView === 'home') { renderHome(); filterGallery(); }
        else if (window.currentView === 'depot') showDepotPhotos(window.currentDepot);
        else if (window.currentView === 'country') showCountryPhotos(window.currentCountry);

        else if (window.currentView === 'sketchgallery') showSketchGallery();
    }
    
    function filterGallery() {
        let term = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let seriesFilter = document.getElementById('seriesFilter')?.value || '';
        let tractionFilter = document.getElementById('tractionFilter')?.value || '';
        let stateFilter = document.getElementById('stateFilter')?.value || '';
        let typeFilter = document.getElementById('typeFilter')?.value || 'all';
        let statusFilter = document.getElementById('statusFilter')?.value || 'all';
        
        let visible = allPhotos.filter(p => p.status === 'approved' || p.status === 'conditional');
        
        if (statusFilter === 'approved') visible = visible.filter(p => p.status === 'approved');
        else if (statusFilter === 'conditional') visible = visible.filter(p => p.status === 'conditional');
        
        if (term) visible = visible.filter(p => 
            p.vehicle.toLowerCase().includes(term) || 
            (p.series || '').toLowerCase().includes(term) || 
            (p.number || '').toLowerCase().includes(term) || 
            (p.depot || '').toLowerCase().includes(term) ||
            (p.loc.station || '').toLowerCase().includes(term)
        );
        if (seriesFilter) visible = visible.filter(p => (p.series || '').toLowerCase() === seriesFilter.toLowerCase());
        if (tractionFilter) visible = visible.filter(p => p.traction === tractionFilter);
        if (stateFilter) visible = visible.filter(p => p.state === stateFilter);
        if (typeFilter === 'sketch') visible = visible.filter(p => p.isSketch === true);
        else if (typeFilter === 'photo') visible = visible.filter(p => p.isSketch !== true);
        
        let grid = document.getElementById('galleryGrid');
        if (grid) grid.innerHTML = visible.slice(0, 24).map(p => photoCard(p)).join('') || '<div style="text-align:center; padding:20px; color:#8870aa;">Нет фото по заданным фильтрам</div>';
    }

    async function doUpload() {
        let file = document.getElementById('uploadFile').files[0];
        if (!file) { alert('Выберите файл'); return; }
        let series = document.getElementById('uploadSeries').value.trim();
        let number = document.getElementById('uploadNumber').value.trim();
        if (!series && !number) { alert('Введите серию или номер'); return; }
        let vehicle = (series && number) ? `${series}-${number}` : (series || number || 'Неизвестно');
        let lat = parseFloat(document.getElementById('uploadLat').value) || 55.7558;
        let lng = parseFloat(document.getElementById('uploadLng').value) || 37.6173;
        
        const btn = event.target;
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Загрузка...';
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const newPhoto = {
                    id: 'p' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    userId: currentUser.id,
                    url: e.target.result,
                    thumb: e.target.result,
                    vehicle: vehicle,
                    series: series || '—',
                    number: number || '—',
                    depot: document.getElementById('uploadDepot').value.trim() || '—',
                    traction: document.getElementById('uploadTraction').value,
                    purpose: document.getElementById('uploadPurpose').value,
                    state: document.getElementById('uploadState').value,
                    loc: {
                        country: document.getElementById('uploadCountry').value || 'Россия',
                        station: document.getElementById('uploadStation').value || '—',
                        line: document.getElementById('uploadLine').value || '—',
                        path: document.getElementById('uploadPath').value || '—',
                        km: document.getElementById('uploadKm').value || '—',
                        lat: lat, lng: lng
                    },
                    status: 'pending',
                    rating: 0, likes: 0, dislikes: 0, views: 0,
                    createdAt: Date.now(),
                    moderationNote: '',
                    exif: {},
                    isSketch: document.getElementById('uploadType').value === 'true'
                };
                await putToStore('photos', newPhoto);
                allPhotos.push(newPhoto);
                if (!vehiclesProfiles[vehicle]) {
                    vehiclesProfiles[vehicle] = { 
                        vehicle: vehicle,
                        series: series || '—',
                        number: number || '—',
                        depot: newPhoto.depot,
                        traction: newPhoto.traction,
                        purpose: newPhoto.purpose,
                        state: newPhoto.state,
                        year: '—', engine: '—', power: '—', color: '—',
                        company: '—', plate: '—', vin: '—', mileage: '—', note: '—'
                    };
                    await putToStore('vehiclesProfiles', vehiclesProfiles[vehicle]);
                }
                let moderators = users.filter(u => u.role === 'admin' || u.role === 'moderator');
                for (let mod of moderators) {
                    await addNotification(mod.id, 'Новое фото', `Пользователь ${currentUser.name} загрузил ${newPhoto.isSketch ? 'фотозарисовку' : 'фото'}: ${vehicle}`);
                }
                showToast('Фото отправлено на модерацию');
                document.getElementById('uploadFile').value = '';
                renderHome();
            } catch(err) { alert('Ошибка загрузки: ' + err.message); }
            finally { btn.disabled = false; btn.innerHTML = 'Отправить на модерацию'; }
        };
        reader.onerror = function() { 
            alert('Ошибка чтения файла'); 
            btn.disabled = false; 
            btn.innerHTML = 'Отправить на модерацию'; 
        };
        reader.readAsDataURL(file);
    }

            else if (tab === 'users' && isFullAdmin) content.innerHTML = users.map(u => `<div class="user-card"><div class="user-row"><i class="fas fa-user-circle" style="font-size:1.8rem; color:#9a7acc;"></i><div><strong style="color:#c8bde0;">${u.name}</strong><br><small style="color:#8870aa;">${u.email}</small><br><span style="font-size:0.75rem; color:#c8bde0;">Роль: ${u.role === 'admin' ? 'Админ' : (u.role === 'moderator' ? 'Модератор' : 'Пользователь')}</span><br><span style="font-size:0.75rem; color:#c8bde0;">Голосование: ${u.banVote ? 'Запрещено' : 'Разрешено'}</span><br><span style="font-size:0.75rem; color:#c8bde0;">Комментарии: ${u.banComment ? 'Запрещены' : 'Разрешены'}</span></div></div><div class="user-actions"><select id="role_${u.id}" style="padding:3px 8px; background:#0a0715; border:1px solid #3a205a; border-radius:6px; color:#c8bde0; font-size:0.7rem;"><option ${u.role === 'user' ? 'selected' : ''}>user</option><option ${u.role === 'moderator' ? 'selected' : ''}>moderator</option><option ${u.role === 'admin' ? 'selected' : ''}>admin</option></select><button class="btn" onclick="changeUserRole('${u.id}', document.getElementById('role_${u.id}').value)">Сохранить</button><button class="btn ${u.banVote ? 'btn-success' : 'btn-warning'}" onclick="toggleBanVote('${u.id}')">Голосование</button><button class="btn ${u.banComment ? 'btn-success' : 'btn-warning'}" onclick="toggleBanComment('${u.id}')">Комментарии</button>${u.id !== currentUser.id ? `<button class="btn btn-danger" onclick="deleteUser('${u.id}')">Удалить</button>` : ''}</div></div>`).join('');

    async function changeUserRole(userId, newRole) { 
        let user = users.find(u => u.id === userId);
        if (user && canEditUsers(currentUser) && user.id !== currentUser.id) {
            user.role = newRole;
            await putToStore('users', user);
            showToast(`Роль изменена на ${newRole === 'admin' ? 'Администратор' : (newRole === 'moderator' ? 'Модератор' : 'Пользователь')}`);
            showAdminPanel();
        }
    }
    
    async function deleteUser(userId) { 
        if (!canEditUsers(currentUser)) return;
        if (userId === currentUser.id) { alert('Нельзя удалить себя'); return; }
        if (confirm('Удалить пользователя и все его фото?')) {
            await deleteFromStore('users', userId);
            users = users.filter(u => u.id !== userId);
            const userPhotos = allPhotos.filter(p => p.userId === userId);
            for (const p of userPhotos) await deleteFromStore('photos', p.id);
            allPhotos = allPhotos.filter(p => p.userId !== userId);
            votes = votes.filter(v => v.userId !== userId);
            comments = comments.filter(c => c.userId !== userId);
            notifications = notifications.filter(n => n.userId !== userId);
            showToast('Пользователь удалён');
            showAdminPanel();
            renderHome();
        }
    }

        let userVote = getUserVote(photo.id);
        let canVote = currentUser && canUserVote(currentUser);
        let modActions = '';
        if (showModActions && canModerate(currentUser) && photo.status === 'pending') {
            modActions = `<div style="margin-top:6px; display:flex; gap:4px; flex-wrap:wrap;">
                <button class="btn btn-success" onclick="event.stopPropagation(); showModerationNoteModal('${photo.id}', 'approved', 'Одобрить')">Одобрить</button>

        }
        let modNoteHtml = '';
        if (photo.moderationNote) {
            const noteClass = photo.status === 'approved' ? 'approved-note' : '';
            modNoteHtml = `<div class="moderation-note ${noteClass}"><i class="fas fa-comment"></i> ${escapeHtml(photo.moderationNote)}</div>`;
        }
        let mapLink = '';

            mapLink = `<div class="map-pin" onclick="event.stopPropagation(); showMapForPhoto('${photo.id}')"><i class="fas fa-map-pin"></i> Карта</div>`;
        }
        let sketchTag = photo.isSketch ? '<span class="sketch-tag">Фотозарисовка</span>' : '';
        let seriesTag = photo.series && photo.series !== '—' ? `<span class="sketch-tag">${photo.series}</span>` : '';
        let stateTag = photo.state ? `<span class="vehicle-state-badge ${getStateClass(photo.state)}" style="font-size:0.55rem;"><i class="fas ${getStateIcon(photo.state)}"></i> ${getStateText(photo.state)}</span>` : '';
        
        return `<div class="photo-card" onclick="showPhotoPage('${photo.id}')">

                    ${stateTag}
                    ${sketchTag}

                    <i class="fas fa-map-marker-alt"></i> ${photo.loc.station || '—'} | ${photo.loc.line || '—'}
                </div>
                ${mapLink}
                ${modNoteHtml}

                <div class="vote-buttons">${currentUser ? (canVote ? `<button class="vote-btn vote-up ${userVote === 1 ? 'vote-active-up' : ''}" onclick="event.stopPropagation(); quickVote('${photo.id}', 1)"><i class="fas fa-plus"></i> ${photo.likes || 0}</button><button class="vote-btn vote-down ${userVote === -1 ? 'vote-active-down' : ''}" onclick="event.stopPropagation(); quickVote('${photo.id}', -1)"><i class="fas fa-minus"></i> ${photo.dislikes || 0}</button>` : `<span style="color:#e74c3c; font-size:0.75rem;">Голосование запрещено</span>`) : `<span style="font-size:0.75rem; color:#8870aa;">Войдите</span>`}</div>

        </div>`;
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    function showAuth() { document.getElementById('app').innerHTML = `<div style="max-width:380px; margin:40px auto; background:#110d1e; padding:24px 16px; border-radius:16px; border:1px solid #6b3f9b; text-align:center;"><h2 style="font-size:1.2rem; color:#9a7acc;">Train Spotting Site</h2><div style="background:#0a0715; padding:8px; border-radius:8px; margin:12px 0; font-size:0.75rem; text-align:left; color:#8870aa;"><div><strong style="color:#9a7acc;">admin@trainspotting.com</strong> / admin123 (админ)</div><div><strong style="color:#9a7acc;">moder@trainspotting.com</strong> / moder123 (модератор)</div><div><strong style="color:#9a7acc;">demo@mail.ru</strong> / demo123 (пользователь)</div></div><input id="loginEmail" placeholder="Email" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:1px solid #3a205a; border-radius:8px; color:#c8bde0; font-size:0.9rem;"><input type="password" id="loginPassword" placeholder="Пароль" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:1px solid #3a205a; border-radius:8px; color:#c8bde0; font-size:0.9rem;"><button class="btn btn-success" onclick="doLogin()" style="width:100%;">Войти</button><div style="margin-top:12px; cursor:pointer; color:#9a7acc; font-size:0.85rem;" onclick="showRegisterForm()">Регистрация</div></div>`; }
    async function doLogin() { let email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value, user = users.find(u => u.email === email && u.password === password); if (user) { currentUser = JSON.parse(JSON.stringify(user)); delete currentUser.password; saveSession(); renderMainApp(); } else alert('Неверный email или пароль'); }
    function showRegisterForm() { document.getElementById('app').innerHTML = `<div style="max-width:380px; margin:40px auto; background:#110d1e; padding:24px 16px; border-radius:16px; border:1px solid #6b3f9b;"><h2 style="font-size:1.2rem; text-align:center; color:#9a7acc;">Регистрация</h2><input id="regName" placeholder="Имя" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:1px solid #3a205a; border-radius:8px; color:#c8bde0; font-size:0.9rem;"><input id="regEmail" placeholder="Email" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:1px solid #3a205a; border-radius:8px; color:#c8bde0; font-size:0.9rem;"><input type="password" id="regPassword" placeholder="Пароль (мин. 4)" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:1px solid #3a205a; border-radius:8px; color:#c8bde0; font-size:0.9rem;"><button class="btn btn-success" onclick="doRegister()" style="width:100%;">Зарегистрироваться</button><div style="margin-top:12px; text-align:center; cursor:pointer; color:#9a7acc; font-size:0.85rem;" onclick="showAuth()">Войти</div></div>`; }
    async function doRegister() { let name = document.getElementById('regName').value, email = document.getElementById('regEmail').value, password = document.getElementById('regPassword').value; if (!name || !email || password.length < 4) { alert('Заполните все поля'); return; } if (users.find(u => u.email === email)) { alert('Email уже используется'); return; } let newUser = { id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6), name, email, password, role: 'user', banVote: false, banComment: false, bio: '', city: '', website: '', telegram: '', createdAt: Date.now() }; await putToStore('users', newUser); users.push(newUser); alert('Регистрация успешна!'); showAuth(); }
    function logout() { localStorage.removeItem('mss_user'); currentUser = null; showAuth(); }
    
    // ========== ГЛАВНАЯ РЕНДЕРИНГ ==========
    async function renderMainApp() {
        if (!currentUser) { showAuth(); return; }
        updateNotifBadge();
        let roleBadge = '';
        if (currentUser.role === 'admin') roleBadge = '<span class="admin-badge">ADMIN</span>';
        else if (currentUser.role === 'moderator') roleBadge = '<span class="moder-badge">MODERATOR</span>';
        let banInfo = (!canUserVote(currentUser) && currentUser.role !== 'admin') ? '<span class="banned-badge">Голосование заблокировано</span>' : '';
        document.getElementById('app').innerHTML = `<div class="header"><div class="logo-area" onclick="renderHome()"><i class="fas fa-train logo"></i><span class="site-title">Train Spotting Site</span></div><div class="user-info"><span><i class="fas fa-user"></i> ${currentUser.name}</span>${roleBadge}${banInfo}<button class="menu-btn" id="menuToggleBtn"><i class="fas fa-bars"></i><span id="notifBadge" class="notif-badge"></span></button></div></div><div class="side-menu" id="sideMenu"><div class="menu-header"><span>Меню</span><button id="closeMenuBtn" style="background:none;border:none;color:#9a7acc;font-size:1.2rem;cursor:pointer;"><i class="fas fa-times"></i></button></div><ul class="menu-list"><li onclick="showUserProfile('${currentUser.id}')"><i class="fas fa-user"></i> Профиль</li><li onclick="showStatistics()"><i class="fas fa-chart-line"></i> Статистика</li><li onclick="showUploadForm()"><i class="fas fa-upload"></i> Загрузка</li><li onclick="showJournal()"><i class="fas fa-history"></i> Журнал</li><li onclick="showMyPhotos()"><i class="fas fa-images"></i> Мои фото</li><li onclick="showSketchGallery()"><i class="fas fa-paint-brush"></i> Фотозарисовки</li><li onclick="showContest()"><i class="fas fa-trophy"></i> Конкурс</li><li onclick="showNotifications()"><i class="fas fa-bell"></i> Уведомления</li><li onclick="showSwitchUserPanel()"><i class="fas fa-exchange-alt"></i> Сменить пользователя</li>${canModerate(currentUser) ? '<li onclick="showAdminPanel()"><i class="fas fa-cogs"></i> Модерация</li>' : ''}<li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Выход</li></ul></div><div class="container" id="mainContent"></div><div id="fullscreenViewer" class="fullscreen-viewer"></div>`;
        document.getElementById('menuToggleBtn').onclick = () => document.getElementById('sideMenu').classList.add('open');
        document.getElementById('closeMenuBtn').onclick = () => document.getElementById('sideMenu').classList.remove('open');
        renderHome();
    }
    
    // ========== ЗАПУСК ==========
    (async function() {
        document.getElementById('app').innerHTML = '<div class="loading-overlay"><div class="loading-spinner"></div><div>Загрузка данных...</div></div>';
        try {
            await initDB();
            await loadAllData();
            renderMainApp();
        } catch(e) {
            console.error('Ошибка запуска:', e);
            document.getElementById('app').innerHTML = '<div style="padding:30px;text-align:center;color:#e74c3c;">Ошибка загрузки. Обновите страницу.</div>';
        }
    })();
    
    // Глобальные функции
    window.quickVote = quickVote; window.moderatePhoto = moderatePhoto; window.changeUserRole = changeUserRole; window.deleteUser = deleteUser;
    window.showCountryPhotos = showCountryPhotos; window.showVehiclePage = showVehiclePage;
    window.showUserProfile = showUserProfile; window.renderHome = renderHome; window.showUploadForm = showUploadForm; window.doUpload = doUpload;
    window.showAdminPanel = showAdminPanel; window.showJournal = showJournal; window.showMyPhotos = showMyPhotos; window.showStatistics = showStatistics;
    window.showContest = showContest; window.showNotifications = showNotifications; window.showSwitchUserPanel = showSwitchUserPanel;
    window.switchToUser = switchToUser; window.logout = logout; window.doLogin = doLogin; window.doRegister = doRegister;
    window.showAuth = showAuth; window.showRegisterForm = showRegisterForm; window.filterGallery = filterGallery;
    window.editPhoto = editPhoto; window.deletePhoto = deletePhoto; 
    window.toggleBanVote = toggleBanVote; window.toggleBanComment = toggleBanComment;
    window.editProfile = editProfile; window.showMapForPhoto = showMapForPhoto; window.deleteComment = deleteComment;
    window.showPhotoPage = showPhotoPage; window.toggleCollapse = toggleCollapse; window.addPhotoPageComment = addPhotoPageComment;
    window.showSketchGallery = showSketchGallery; window.showRandomPhoto = showRandomPhoto; window.showModelStats = showModelStats;
    window.showDepotPhotos = showDepotPhotos; window.showConditionalPhotos = showConditionalPhotos;
    window.showModerationNoteModal = showModerationNoteModal; window.moderatePhotoWithNote = moderatePhotoWithNote;
</script>
</body>
</html>
