<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Train Spotting Site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* ===== ОСТРЫЙ, АГРЕССИВНЫЙ ДИЗАЙН ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', 'Impact', system-ui, sans-serif; 
            background: #07050e; 
            color: #d4c8f0; 
            line-height: 1.5; 
            -webkit-tap-highlight-color: transparent;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(80, 20, 160, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(120, 40, 200, 0.10) 0%, transparent 50%),
                repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(60, 20, 120, 0.03) 100px, rgba(60, 20, 120, 0.03) 101px);
            min-height: 100vh;
        }
        
        /* ===== ОСТРЫЙ ХЕДЕР ===== */
        .header { 
            background: #0a0715; 
            border-bottom: 3px solid #6b2fd0; 
            padding: 0.5rem 0.8rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 6px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 0 30px rgba(107, 47, 208, 0.3), inset 0 -2px 20px rgba(107, 47, 208, 0.1);
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 calc(100% - 4px));
        }
        .logo-area { display: flex; align-items: center; gap: 8px; cursor: pointer; flex-shrink: 0; }
        .logo { font-size: 1.5rem; color: #a86eff; filter: drop-shadow(0 0 10px #6b2fd0); }
        .site-title { 
            font-size: 0.95rem; 
            font-weight: 900; 
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d4c8f0, #a86eff, #6b2fd0); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            text-shadow: 0 0 30px rgba(107, 47, 208, 0.5);
            text-transform: uppercase;
        }
        .menu-btn { 
            background: transparent; 
            border: 2px solid #6b2fd0; 
            font-size: 1rem; 
            cursor: pointer; 
            color: #a86eff; 
            padding: 4px 12px; 
            border-radius: 0; 
            position: relative; 
            transition: 0.2s; 
            flex-shrink: 0; 
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0 100%);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu-btn:active { background: #6b2fd0; color: #000; transform: scale(0.95); }
        .menu-btn:hover { background: rgba(107, 47, 208, 0.2); }
        .notif-badge { 
            position: absolute; 
            top: -6px; 
            right: -6px; 
            background: #ff0040; 
            color: white; 
            border-radius: 0; 
            padding: 1px 7px; 
            font-size: 0.5rem; 
            font-weight: 900; 
            min-width: 18px; 
            text-align: center; 
            clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
            box-shadow: 0 0 15px rgba(255, 0, 64, 0.6);
        }
        .user-info { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 0.75rem; }
        .user-info > span { display: flex; align-items: center; gap: 4px; }
        .admin-badge { background: #ff0040; padding: 2px 10px; border-radius: 0; font-size: 0.5rem; font-weight: 900; color: #fff; clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%); }
        .moder-badge { background: #6b2fd0; padding: 2px 10px; border-radius: 0; font-size: 0.5rem; font-weight: 900; color: #fff; clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%); }
        .banned-badge { background: #333; padding: 2px 10px; border-radius: 0; font-size: 0.5rem; font-weight: 900; color: #888; clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%); }
        
        /* ===== ОСТРОЕ МЕНЮ ===== */
        .side-menu { 
            position: fixed; 
            top: 0; 
            right: -100%; 
            width: 85%; 
            max-width: 300px; 
            height: 100%; 
            background: #0a0715; 
            border-left: 3px solid #6b2fd0; 
            transition: 0.3s ease; 
            z-index: 200; 
            padding: 16px; 
            overflow-y: auto; 
            box-shadow: -10px 0 50px rgba(107, 47, 208, 0.3);
        }
        .side-menu.open { right: 0; }
        .menu-header { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 16px; 
            font-weight: 900; 
            color: #a86eff; 
            border-bottom: 2px solid #6b2fd0; 
            padding-bottom: 8px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .menu-list { list-style: none; }
        .menu-list li { 
            padding: 12px 0 12px 6px; 
            border-bottom: 1px solid rgba(107, 47, 208, 0.2); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            transition: 0.2s; 
            border-radius: 0; 
            font-size: 0.85rem; 
            color: #d4c8f0; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%);
        }
        .menu-list li i { width: 24px; color: #a86eff; font-size: 1rem; }
        .menu-list li:active { color: #fff; background: rgba(107, 47, 208, 0.2); border-left: 3px solid #a86eff; padding-left: 10px; }
        
        /* ===== ОСТРЫЕ КОНТЕЙНЕРЫ ===== */
        .container { max-width: 100%; margin: 8px auto; padding: 0 8px; }
        .section { 
            background: #0d0a1a; 
            border-radius: 0; 
            padding: 14px; 
            margin-bottom: 12px; 
            border: 2px solid #3a1a6a; 
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
            box-shadow: 0 0 25px rgba(107, 47, 208, 0.15), inset 0 0 40px rgba(107, 47, 208, 0.05);
            position: relative;
        }
        .section::before {
            content: '';
            position: absolute;
            top: -1px; left: 10%;
            width: 30%; height: 2px;
            background: linear-gradient(90deg, transparent, #a86eff, transparent);
            filter: blur(2px);
        }
        h2, h3 { 
            margin-bottom: 12px; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            border-left: 4px solid #a86eff; 
            padding-left: 12px; 
            font-size: 1rem; 
            color: #d4c8f0; 
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(168, 110, 255, 0.3);
        }
        .main-two-columns { display: flex; flex-direction: column; gap: 12px; }
        .main-center { width: 100%; }
        .main-sidebar { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .side-block { 
            background: #0d0a1a; 
            border-radius: 0; 
            padding: 12px; 
            border: 2px solid #3a1a6a; 
            clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
        }
        .side-block h4 { 
            margin-bottom: 8px; 
            font-size: 0.85rem; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            color: #a86eff; 
            border-left: 3px solid #a86eff; 
            padding-left: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }
        
        /* ===== ОСТРЫЕ КАРТОЧКИ ===== */
        .photo-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
        .photo-card { 
            background: #0d0a1a; 
            border-radius: 0; 
            overflow: hidden; 
            border: 2px solid #3a1a6a; 
            transition: 0.2s; 
            cursor: pointer; 
            position: relative; 
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%);
            box-shadow: 0 0 20px rgba(107, 47, 208, 0.1);
        }
        .photo-card:active { transform: scale(0.97); border-color: #a86eff; }
        .photo-card:hover { border-color: #6b2fd0; box-shadow: 0 0 30px rgba(107, 47, 208, 0.2); }
        .photo-card img { width: 100%; height: 180px; object-fit: cover; background: #0a0715; border-bottom: 2px solid #3a1a6a; }
        .photo-info { padding: 12px; }
        .vehicle-name { 
            font-weight: 900; 
            font-size: 0.95rem; 
            cursor: pointer; 
            color: #a86eff; 
            display: inline-block; 
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(168, 110, 255, 0.3);
        }
        .status-badge { 
            position: absolute; 
            top: 8px; 
            right: 8px; 
            padding: 3px 10px; 
            border-radius: 0; 
            font-size: 0.55rem; 
            font-weight: 900; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px); 
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
            border-left: 2px solid;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .badge-approved { background: #00cc66; color: #000; border-left-color: #00ff88; box-shadow: 0 0 20px rgba(0, 204, 102, 0.3); }
        .badge-conditional { background: #8e44ad; color: #fff; border-left-color: #a86eff; }
        .badge-pending { background: #e67e22; color: #fff; border-left-color: #f39c12; }
        .badge-rejected { background: #e74c3c; color: #fff; border-left-color: #ff0040; }
        
        .photo-stats { display: flex; gap: 12px; margin-top: 6px; font-size: 0.65rem; color: #8870aa; flex-wrap: wrap; font-weight: 600; }
        .vote-buttons { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .vote-btn { 
            background: rgba(20, 10, 40, 0.9); 
            border: 2px solid #3a1a6a; 
            cursor: pointer; 
            font-size: 0.75rem; 
            padding: 4px 14px; 
            border-radius: 0; 
            transition: 0.15s; 
            font-weight: 700; 
            touch-action: manipulation; 
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
            color: #d4c8f0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .vote-up { color: #00cc66; }
        .vote-up:active { background: #00cc66; color: #000; }
        .vote-down { color: #ff0040; }
        .vote-down:active { background: #ff0040; color: #fff; }
        .vote-active-up { background: #00cc66; color: #000; border-color: #00cc66; }
        .vote-active-down { background: #ff0040; color: #fff; border-color: #ff0040; }
        
        /* ===== ОСТРЫЕ ФОРМЫ ===== */
        .form-group { margin-bottom: 12px; }
        .form-group label { font-size: 0.8rem; display: block; margin-bottom: 4px; color: #8870aa; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; 
            padding: 10px 14px; 
            background: #0a0715; 
            border: 2px solid #3a1a6a; 
            border-radius: 0; 
            color: #d4c8f0; 
            transition: 0.2s; 
            font-size: 0.9rem; 
            -webkit-appearance: none; 
            appearance: none; 
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%);
            font-weight: 500;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { 
            outline: none; 
            border-color: #a86eff; 
            box-shadow: 0 0 25px rgba(168, 110, 255, 0.2), inset 0 0 25px rgba(168, 110, 255, 0.05);
        }
        
        /* ===== ОСТРЫЕ КНОПКИ ===== */
        button, .btn { 
            background: #0d0a1a; 
            color: #a86eff; 
            border: 2px solid #3a1a6a; 
            padding: 6px 16px; 
            border-radius: 0; 
            cursor: pointer; 
            font-size: 0.8rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            transition: 0.15s; 
            touch-action: manipulation; 
            min-height: 38px; 
            justify-content: center; 
            clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:active, .btn:active { transform: scale(0.95); background: #6b2fd0; color: #000; }
        .btn-success { background: #0a1a10; border-color: #00cc66; color: #00cc66; }
        .btn-success:active { background: #00cc66; color: #000; }
        .btn-danger { background: #1a0a0a; border-color: #ff0040; color: #ff0040; }
        .btn-danger:active { background: #ff0040; color: #fff; }
        .btn-warning { background: #1a100a; border-color: #e67e22; color: #e67e22; }
        .btn-warning:active { background: #e67e22; color: #000; }
        .btn-primary { background: #0a0a1a; border-color: #a86eff; color: #a86eff; }
        .btn-purple { background: #1a0a2a; border-color: #9b59b6; color: #9b59b6; }
        .btn-purple:active { background: #9b59b6; color: #000; }
        .btn-gold { background: #1a1a0a; border-color: #f1c40f; color: #f1c40f; }
        .btn-gold:active { background: #f1c40f; color: #000; }
        
        /* ===== ФИЛЬТРЫ ===== */
        .filter-chip { 
            background: #0d0a1a; 
            padding: 5px 14px; 
            border-radius: 0; 
            border: 2px solid #3a1a6a; 
            cursor: pointer; 
            font-size: 0.65rem; 
            transition: 0.2s; 
            touch-action: manipulation; 
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #d4c8f0;
        }
        .filter-chip:active { transform: scale(0.95); background: #a86eff; color: #000; border-color: #a86eff; }
        .filter-chip.active { background: #a86eff; color: #000; border-color: #a86eff; }
        
        /* ===== СТАТИСТИКА ===== */
        .stat-card { 
            background: #0d0a1a; 
            padding: 10px 14px; 
            border-radius: 0; 
            border: 2px solid #a86eff; 
            text-align: center; 
            flex: 1; 
            min-width: 60px; 
            clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
            box-shadow: 0 0 20px rgba(168, 110, 255, 0.1);
        }
        .stat-number { font-size: 1.6rem; font-weight: 900; color: #a86eff; text-shadow: 0 0 30px rgba(168, 110, 255, 0.3); }
        .stat-card div:last-child { font-size: 0.65rem; color: #8870aa; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        /* ===== КОММЕНТАРИИ ===== */
        .comment { 
            background: #0a0715; 
            padding: 8px 12px; 
            border-radius: 0; 
            margin-bottom: 6px; 
            display: flex; 
            justify-content: space-between; 
            flex-wrap: wrap; 
            align-items: center; 
            border-left: 3px solid #3a1a6a; 
            font-size: 0.85rem; 
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%);
        }
        .comment strong { color: #a86eff; }
        
        /* ===== ПРАВИЛА ===== */
        .rules-text { line-height: 1.8; color: #8870aa; font-size: 0.8rem; }
        .rules-text p { margin-bottom: 6px; padding-left: 4px; border-left: 2px solid transparent; padding-left: 10px; }
        .rules-text p:hover { border-left-color: #a86eff; }
        .rules-text .rule-num { color: #a86eff; font-weight: 900; }
        
        /* ===== ПОЛЬЗОВАТЕЛИ ===== */
        .user-card { 
            background: #0d0a1a; 
            padding: 10px; 
            border-radius: 0; 
            margin-bottom: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            border: 2px solid #3a1a6a; 
            transition: 0.2s; 
            font-size: 0.8rem; 
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%);
        }
        .user-card .user-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; width: 100%; }
        .user-card .user-actions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
        .user-card .user-actions select { 
            padding: 3px 8px; 
            background: #0a0715; 
            border: 2px solid #3a1a6a; 
            border-radius: 0; 
            color: #d4c8f0; 
            font-size: 0.7rem; 
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }
        
        /* ===== ТАБЫ ===== */
        .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 2px solid #3a1a6a; flex-wrap: wrap; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tab-btn { 
            background: none; 
            border: none; 
            padding: 6px 14px; 
            cursor: pointer; 
            color: #8870aa; 
            border-radius: 0; 
            transition: 0.2s; 
            font-weight: 700; 
            font-size: 0.75rem; 
            white-space: nowrap; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active { color: #a86eff; border-bottom-color: #a86eff; background: rgba(168, 110, 255, 0.05); }
        
        /* ===== МОДАЛКИ ===== */
        .edit-modal { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.97); 
            z-index: 5000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 12px; 
        }
        .edit-modal > div { 
            background: #0d0a1a; 
            padding: 16px; 
            border-radius: 0; 
            width: 100%; 
            max-width: 500px; 
            border: 3px solid #6b2fd0; 
            max-height: 90vh; 
            overflow-y: auto; 
            color: #d4c8f0; 
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%);
            box-shadow: 0 0 60px rgba(107, 47, 208, 0.3);
        }
        
        /* ===== СТРАНА ===== */
        .country-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            padding: 6px 12px; 
            border-bottom: 1px solid #2a1a4a; 
            cursor: pointer; 
            border-radius: 0; 
            transition: 0.2s; 
            font-size: 0.85rem; 
            clip-path: polygon(0 0, 100% 0, 98% 100%, 0 100%);
            font-weight: 600;
        }
        .country-item:active { background: rgba(107, 47, 208, 0.15); padding-left: 18px; border-left: 3px solid #a86eff; }
        
        /* ===== ТОСТ ===== */
        .toast { 
            position: fixed; 
            bottom: 16px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #00cc66; 
            color: #000; 
            padding: 10px 20px; 
            border-radius: 0; 
            z-index: 9999; 
            animation: fadeOut 3s forwards; 
            font-weight: 900; 
            font-size: 0.85rem; 
            max-width: 90%; 
            text-align: center; 
            clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
            box-shadow: 0 0 40px rgba(0, 204, 102, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        
        /* ===== ЗАГРУЗКА ===== */
        .loading-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #07050e; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 10000; 
            flex-direction: column; 
            gap: 16px; 
        }
        .loading-spinner { 
            width: 40px; 
            height: 40px; 
            border: 4px solid #3a1a6a; 
            border-top-color: #a86eff; 
            border-radius: 0; 
            animation: spin 0.8s linear infinite; 
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* ===== КАРТА ===== */
        .map-container { height: 180px; border-radius: 0; margin: 8px 0; border: 2px solid #3a1a6a; overflow: hidden; }
        .map-container .leaflet-control-zoom { border-radius: 0; }
        .map-pin { cursor: pointer; color: #a86eff; font-weight: 700; font-size: 0.8rem; }
        .map-pin:active { text-decoration: underline; }
        
        /* ===== СКЕТЧИ ===== */
        .sketch-tag { display: inline-block; background: #1a0a2a; padding: 2px 12px; border-radius: 0; font-size: 0.6rem; color: #8870aa; margin: 2px; border: 1px solid #3a1a6a; clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%); font-weight: 700; }
        .sketch-gallery .photo-card { border-color: #6b2fd0; }
        .sketch-gallery .photo-card::before { content: '◆'; position: absolute; top: 8px; left: 8px; font-size: 1.2rem; z-index: 2; color: #a86eff; text-shadow: 0 0 20px rgba(168, 110, 255, 0.5); }
        
        /* ===== МОДЕЛЬНЫЙ ЧИП ===== */
        .model-filter-chip { 
            background: #0d0a1a; 
            padding: 3px 12px; 
            border-radius: 0; 
            border: 2px solid #3a1a6a; 
            cursor: pointer; 
            font-size: 0.65rem; 
            transition: 0.2s; 
            touch-action: manipulation; 
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
            font-weight: 700;
            color: #d4c8f0;
        }
        .model-filter-chip:active { transform: scale(0.95); background: #a86eff; color: #000; border-color: #a86eff; }
        .model-filter-chip.active { background: #a86eff; color: #000; border-color: #a86eff; }
        
        /* ===== ПОХОЖИЕ ФОТО ===== */
        .similar-photos { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; margin-top: 6px; }
        .similar-photos img { 
            width: 100%; 
            height: 80px; 
            object-fit: cover; 
            border-radius: 0; 
            cursor: pointer; 
            border: 2px solid #3a1a6a; 
            transition: 0.2s;

            request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('users')) db.createObjectStore('users', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('photos')) db.createObjectStore('photos', { keyPath: 'id' });

            request.onerror = () => reject(request.error);
        });
    }
    async function putToStore(storeName, item) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readwrite');

            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function quickVote(photoId, val) {
        if (!currentUser) { alert('ВОЙДИТЕ ЧТОБЫ ГОЛОСОВАТЬ'); return; }
        if (!canUserVote(currentUser)) { alert('ГОЛОСОВАНИЕ ЗАПРЕЩЕНО АДМИНИСТРАТОРОМ'); return; }
        let photo = allPhotos.find(p => p.id === photoId);
        if (!photo) return;
        if (photo.userId === currentUser.id) { alert('НЕЛЬЗЯ ГОЛОСОВАТЬ ЗА СВОЁ ФОТО'); return; }
        let existing = votes.find(v => v.photoId === photoId && v.userId === currentUser.id);
        if (existing) {
            if (existing.value === val) return;
            if (val === 1) { photo.likes++; if (existing.value === -1) photo.dislikes--; }
            else { photo.dislikes++; if (existing.value === 1) photo.likes--; }
            photo.rating += (val - existing.value);
            existing.value = val;
            await putToStore('votes', existing);
        } else {
            if (val === 1) photo.likes++;
            else photo.dislikes++;
            photo.rating += val;
            const newVote = { id: Date.now() + '_' + Math.random().toString(36).substr(2, 6), photoId, userId: currentUser.id, value: val };
            await putToStore('votes', newVote);
            votes.push(newVote);
        }
        await putToStore('photos', photo);
        refreshCurrentView();
    }

                        p.vehicle = newVehicle; 
                        p.model = req.changes.model || newVehicle;

            vehiclesProfiles[newVehicle] = { vehicle: newVehicle, ...req.changes };

    function renderMap(containerId, lat, lng, zoom = 12) {
        setTimeout(() => {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            try {
                const map = L.map(containerId).setView([lat, lng], zoom);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);
                L.marker([lat, lng]).addTo(map);
                setTimeout(() => map.invalidateSize(), 200);
            } catch(e) { console.error('ОШИБКА КАРТЫ:', e); }
        }, 150);
    }

                <div style="display:flex; flex-direction:column; gap:6px;">
                    ${sorted.map(([model, count], i) => `
                        <div style="display:flex; align-items:center; gap:10px; background:#0d0a1a; padding:6px 12px; border:2px solid #3a1a6a; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);">
                            <span style="font-weight:900; color:#a86eff; min-width:24px;">${i+1}.</span>
                            <span style="flex:1; color:#d4c8f0; font-weight:700;">${model}</span>
                            <span style="background:#0a0715; padding:2px 12px; clip-path:polygon(0 0,100% 0,90% 100%,0 100%); font-size:0.75rem; color:#8870aa; font-weight:700;">${count} ФОТО</span>
                        </div>

                </div>
                <button class="btn" onclick="renderHome()" style="margin-top:12px;">НА ГЛАВНУЮ</button>
            </div>
        `;
    }
    
    // ========== СТРАНИЦЫ ==========
    function showPhotoPage(photoId) {
        let photo = allPhotos.find(p => p.id === photoId);
        if (!photo) { renderHome(); return; }
        window.currentView = 'photopage';
        window.currentPhotoId = photoId;
        photo.views = (photo.views || 0) + 1;
        putToStore('photos', photo);
        
        let author = users.find(u => u.id === photo.userId);
        let profile = vehiclesProfiles[photo.vehicle] || {};
        let photoComments = comments.filter(c => c.photoId === photoId);
        let userVote = getUserVote(photoId);
        let canVote = currentUser && canUserVote(currentUser);
        let canComment = currentUser && canUserComment(currentUser);
        let isAdmin = canModerate(currentUser);
        let similar = allPhotos.filter(p => p.id !== photoId && p.status === 'approved' && (p.model === photo.model || p.loc.city === photo.loc.city)).slice(0, 6);
        
        let collapseId = 'collapse_' + photoId;
        let exifHtml = '';
        if (photo.exif && Object.keys(photo.exif).length > 0) {
            const exifData = photo.exif;
            exifHtml = `<div class="exif-data">${Object.entries(exifData).map(([k,v]) => `<div><span>${k.toUpperCase()}:</span> ${v}</div>`).join('')}</div>`;
        }
        
        let mapLink = '';
        if (photo.loc && photo.loc.lat && photo.loc.lng) {
            mapLink = `<button class="btn" onclick="showMapForPhoto('${photo.id}')"><i class="fas fa-map-pin"></i> ПОКАЗАТЬ НА КАРТЕ</button>`;
        }
        
        let modActions = '';
        if (isAdmin && photo.status === 'pending') {
            modActions = `<div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;"><button class="btn btn-success" onclick="moderatePhoto('${photo.id}', 'approved', '')">ОДОБРИТЬ</button><button class="btn btn-warning" onclick="showModerationNoteModal('${photo.id}', 'conditional')">УСЛОВНО</button><button class="btn btn-danger" onclick="showModerationNoteModal('${photo.id}', 'rejected')">ОТКЛОНИТЬ</button></div>`;
        }
        
        let adminActions = '';
        if (isAdmin) {
            adminActions = `<div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;"><button class="btn" onclick="editPhoto('${photo.id}')">РЕДАКТИРОВАТЬ</button><button class="btn btn-danger" onclick="deletePhoto('${photo.id}')">УДАЛИТЬ</button></div>`;
        }
        
        let extraInfoHtml = '';
        if (profile.company || profile.plate || profile.vin || profile.color || profile.mileage) {
            extraInfoHtml = `<div class="vehicle-extra-info">
                ${profile.company ? `<div><i class="fas fa-building"></i> <span>${profile.company}</span></div>` : ''}
                ${profile.plate ? `<div><i class="fas fa-id-card"></i> <span>${profile.plate}</span></div>` : ''}
                ${profile.vin ? `<div><i class="fas fa-barcode"></i> <span>${profile.vin}</span></div>` : ''}
                ${profile.color ? `<div><i class="fas fa-palette"></i> <span>${profile.color}</span></div>` : ''}
                ${profile.mileage ? `<div><i class="fas fa-tachometer-alt"></i> <span>${profile.mileage}</span></div>` : ''}
            </div>`;
        }
        
        let sketchBadge = photo.isSketch ? '<span class="sketch-tag">ФОТОЗАРИСОВКА</span>' : '';
        let modelTag = photo.model ? `<span class="sketch-tag"><i class="fas fa-tag"></i> ${photo.model}</span>` : '';
        
        let html = `
            <div class="section photo-page">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; margin-bottom:6px;">
                    <h2 style="border-left-color:${photo.status === 'approved' ? '#00cc66' : '#e67e22'}; font-size:1rem;">${photo.vehicle}</h2>
                    <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
                        ${modelTag}
                        ${sketchBadge}
                        <span class="status-badge ${getBadgeClass(photo.status)}" style="position:static;">${getStatusText(photo.status)}</span>
                    </div>
                </div>
                <div class="photo-page-main">
                    <div class="photo-page-image">
                        <img src="${photo.url}" alt="${photo.vehicle}" loading="lazy">
                        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; font-size:0.8rem; color:#d4c8f0;">
                            <div><i class="fas fa-user"></i> АВТОР: <span style="color:#a86eff;cursor:pointer; font-weight:700;" onclick="showUserProfile('${photo.userId}')">${author?.name || '?'}</span></div>
                            <div><i class="fas fa-calendar-alt"></i> ${new Date(photo.createdAt).toLocaleDateString()}</div>
                            <div>${getFlag(photo.loc.country)} ${formatLoc(photo.loc)}</div>
                        </div>
                        ${mapLink}
                        ${modActions}
                        ${adminActions}
                    </div>
                    <div class="photo-page-sidebar">
                        <div class="info-block">
                            <h4><i class="fas fa-thumbs-up"></i> ОЦЕНКИ</h4>
                            <div class="rating-summary">
                                <div class="rating-item likes"><i class="fas fa-thumbs-up"></i> <span class="num">${photo.likes || 0}</span></div>
                                <div class="rating-item dislikes"><i class="fas fa-thumbs-down"></i> <span class="num">${photo.dislikes || 0}</span></div>
                                <div class="rating-item views"><i class="fas fa-eye"></i> <span class="num">${photo.views || 0}</span></div>
                            </div>
                            <div class="vote-buttons">
                                ${currentUser ? (canVote ? 
                                    `<button class="vote-btn vote-up vote-big ${userVote === 1 ? 'vote-active-up' : ''}" onclick="quickVote('${photo.id}', 1)"><i class="fas fa-plus"></i> ${photo.likes || 0}</button>
                                     <button class="vote-btn vote-down vote-big ${userVote === -1 ? 'vote-active-down' : ''}" onclick="quickVote('${photo.id}', -1)"><i class="fas fa-minus"></i> ${photo.dislikes || 0}</button>` 
                                    : `<span style="color:#ff0040; font-size:0.8rem; font-weight:700;">ГОЛОСОВАНИЕ ЗАПРЕЩЕНО</span>`) 
                                : `<span style="font-size:0.8rem; color:#8870aa; font-weight:700;">ВОЙДИТЕ ЧТОБЫ ГОЛОСОВАТЬ</span>`}
                            </div>
                        </div>
                        
                        <div class="info-block">
                            <h4><i class="fas fa-info-circle"></i> ИНФОРМАЦИЯ О ТС</h4>
                            ${extraInfoHtml}
                            <div class="collapse-trigger" onclick="toggleCollapse('${collapseId}')">
                                <span><i class="fas fa-chevron-down" id="icon_${collapseId}"></i> ПОДРОБНЕЕ</span>
                                <span class="vehicle-state-badge ${getStateClass(profile.state)}"><i class="fas ${getStateIcon(profile.state)}"></i> ${getStateText(profile.state)}</span>
                            </div>
                            <div class="collapse-content" id="${collapseId}">
                                <table>
                                    <tr><td>МОДЕЛЬ</td><td>${profile.model || '—'}</td></tr>
                                    <tr><td>ГОД</td><td>${profile.year || '—'}</td></tr>
                                    <tr><td>ДВИГАТЕЛЬ</td><td>${profile.engine || '—'}</td></tr>
                                    <tr><td>МОЩНОСТЬ</td><td>${profile.power || '—'}</td></tr>
                                    <tr><td>КУЗОВ</td><td>${profile.body || '—'}</td></tr>
                                    <tr><td>ПРИВОД</td><td>${profile.drive || '—'}</td></tr>
                                    <tr><td>НАЗНАЧЕНИЕ</td><td>${profile.purpose || '—'}</td></tr>
                                </table>
                                <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
                                    ${canEditUsers(currentUser) ? `<button class="btn" onclick="editVehicleProfile('${escapeHtml(photo.vehicle)}')">РЕДАКТИРОВАТЬ ТС</button>` : `<button class="btn" onclick="requestVehicleEdit('${escapeHtml(photo.vehicle)}')">ПРЕДЛОЖИТЬ ИЗМЕНЕНИЕ</button>`}
                                    <button class="btn" onclick="showVehiclePage('${escapeHtml(photo.vehicle)}')">ВСЕ ФОТО ТС</button>
                                </div>
                            </div>
                        </div>
                        
                        ${exifHtml ? `<div class="info-block"><h4><i class="fas fa-camera"></i> EXIF ДАННЫЕ</h4>${exifHtml}</div>` : ''}
                        
                        <div class="info-block">
                            <h4><i class="fas fa-comments"></i> КОММЕНТАРИИ (${photoComments.length})</h4>
                            <div id="fsComments">${photoComments.map(c => {
                                let commentAuthor = users.find(u => u.id === c.userId);
                                let canDelete = (currentUser && (currentUser.id === c.userId || canModerate(currentUser)));
                                return `<div class="comment"><strong>${commentAuthor?.name || '?'}</strong>: ${c.text} ${canDelete ? `<button class="del-comment" onclick="deleteComment('${c.id}')" style="background:none;border:none;color:#ff0040;cursor:pointer;padding:2px 6px;font-weight:700;"><i class="fas fa-trash-alt"></i></button>` : ''}</div>`;
                            }).join('')}</div>
                            ${currentUser ? (canComment ? `<div style="display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;"><input id="photoPageCommentInput" placeholder="НАПИСАТЬ КОММЕНТАРИЙ..." style="flex:1; min-width:120px; padding:8px 14px; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.85rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);"><button class="btn btn-success" onclick="addPhotoPageComment('${photo.id}')">ОТПРАВИТЬ</button></div>` : `<p style="color:#ff0040; font-size:0.8rem; font-weight:700;">КОММЕНТИРОВАНИЕ ЗАПРЕЩЕНО</p>`) : `<p style="font-size:0.8rem; color:#8870aa; font-weight:700;">ВОЙДИТЕ ЧТОБЫ КОММЕНТИРОВАТЬ</p>`}
                        </div>
                        
                        ${similar.length ? `<div class="info-block"><h4><i class="fas fa-images"></i> ПОХОЖИЕ ФОТО</h4><div class="similar-photos">${similar.map(p => `<img src="${p.thumb}" onclick="showPhotoPage('${p.id}')" title="${p.vehicle}" loading="lazy">`).join('')}</div></div>` : ''}
                    </div>
                </div>
                <button class="btn" onclick="renderHome()" style="align-self:flex-start;"><i class="fas fa-arrow-left"></i> НА ГЛАВНУЮ</button>
            </div>
        `;
        document.getElementById('mainContent').innerHTML = html;
        setTimeout(() => {
            let el = document.getElementById(collapseId);
            if (el) { el.classList.add('open'); document.getElementById('icon_' + collapseId).className = 'fas fa-chevron-up'; }
        }, 100);
    }
    
    function toggleCollapse(id) {
        let el = document.getElementById(id);
        let icon = document.getElementById('icon_' + id);
        if (el) {
            el.classList.toggle('open');
            if (icon) icon.className = el.classList.contains('open') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
        }
    }
    
    async function addPhotoPageComment(id) {
        let text = document.getElementById('photoPageCommentInput')?.value;
        if (text && currentUser && canUserComment(currentUser)) {
            let newComment = { id: 'c' + Date.now() + '_' + Math.random().toString(36).substr(2, 6), photoId: id, userId: currentUser.id, text: text.toUpperCase(), createdAt: Date.now() };
            await putToStore('comments', newComment);
            comments.push(newComment);
            showPhotoPage(id);
        } else if (!canUserComment(currentUser)) alert('КОММЕНТИРОВАНИЕ ЗАПРЕЩЕНО');
    }
    
    // ========== ОБНОВЛЕНИЕ ВИДОВ ==========
    function refreshCurrentView() {
        if (window.currentView === 'home') { renderHome(); filterGallery(); }
        else if (window.currentView === 'city') showCityPhotos(window.currentCity);
        else if (window.currentView === 'country') showCountryPhotos(window.currentCountry);
        else if (window.currentView === 'vehicle') showVehiclePage(window.currentVehicle);
        else if (window.currentView === 'profile') showUserProfile(window.currentProfileId);
        else if (window.currentView === 'admin') showAdminPanel();
        else if (window.currentView === 'contest') showContest();
        else if (window.currentView === 'notifications') showNotifications();
        else if (window.currentView === 'journal') showJournal();
        else if (window.currentView === 'photopage') showPhotoPage(window.currentPhotoId);
        else if (window.currentView === 'sketchgallery') showSketchGallery();
    }
    
    function filterGallery() {
        let term = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let modelFilter = document.getElementById('modelFilter')?.value || '';
        let countryFilter = document.getElementById('countryFilter')?.value || '';
        let typeFilter = document.getElementById('typeFilter')?.value || 'all';
        
        let visible = allPhotos.filter(p => p.status === 'approved');
        if (term) visible = visible.filter(p => p.vehicle.toLowerCase().includes(term) || (p.loc.country || '').toLowerCase().includes(term) || (p.loc.city || '').toLowerCase().includes(term) || (p.model || '').toLowerCase().includes(term));
        if (modelFilter) visible = visible.filter(p => (p.model || '').toLowerCase() === modelFilter.toLowerCase());
        if (countryFilter) visible = visible.filter(p => (p.loc.country || '').toLowerCase() === countryFilter.toLowerCase());
        if (typeFilter === 'sketch') visible = visible.filter(p => p.isSketch === true);
        else if (typeFilter === 'photo') visible = visible.filter(p => p.isSketch !== true);
        
        let grid = document.getElementById('galleryGrid');
        if (grid) grid.innerHTML = visible.slice(0, 24).map(p => photoCard(p)).join('') || '<div style="text-align:center; padding:20px; color:#8870aa; font-weight:700;">НЕТ ФОТО ПО ЗАДАННЫМ ФИЛЬТРАМ</div>';
    }
    
    // ========== ГАЛЕРЕЯ ФОТОЗАРИСОВОК ==========
    function showSketchGallery() {
        window.currentView = 'sketchgallery';
        let sketches = allPhotos.filter(p => p.status === 'approved' && p.isSketch === true);
        document.getElementById('mainContent').innerHTML = `
            <div class="section sketch-gallery">
                <h2 style="font-size:1rem;"><i class="fas fa-paint-brush"></i> ГАЛЕРЕЯ ФОТОЗАРИСОВОК</h2>
                <p style="font-size:0.8rem; color:#8870aa; margin-bottom:10px; font-weight:600;">ХУДОЖЕСТВЕННЫЕ КАДРЫ, АТМОСФЕРНЫЕ СНИМКИ И НЕОБЫЧНЫЕ РАКУРСЫ</p>
                <div class="photo-grid">${sketches.map(p => photoCard(p)).join('') || '<div style="text-align:center; padding:20px; color:#8870aa; font-weight:700;">НЕТ ФОТОЗАРИСОВОК</div>'}</div>
                <button class="btn" onclick="renderHome()" style="margin-top:10px;">НА ГЛАВНУЮ</button>
            </div>
        `;
    }
    
    // ========== СТРАНИЦЫ ==========
    function showContest() {
        window.currentView = 'contest';
        let topPhotos = [...allPhotos.filter(p => p.status === 'approved')].sort((a,b) => b.rating - a.rating).slice(0, 6);
        document.getElementById('mainContent').innerHTML = `<div class="section"><h2 style="font-size:1rem;"><i class="fas fa-trophy"></i> КОНКУРС ЛУЧШИХ ФОТО</h2><p style="margin-bottom:10px; font-size:0.85rem; color:#8870aa; font-weight:600;">ТОП-6 ФОТОГРАФИЙ ПО РЕЙТИНГУ! ГОЛОСУЙТЕ ЗА ЛУЧШИЕ РАБОТЫ.</p><div class="photo-grid">${topPhotos.map(p => photoCard(p)).join('') || '<div style="color:#8870aa; font-weight:700;">НЕТ ФОТО</div>'}</div><button class="btn" onclick="renderHome()">НА ГЛАВНУЮ</button></div>`;
    }
    
    async function showNotifications() {
        window.currentView = 'notifications';
        let myNotifs = notifications.filter(n => n.userId === currentUser.id).reverse();
        for (let n of myNotifs) { if (!n.read) { n.read = true; await putToStore('notifications', n); } }
        notifications = notifications.map(n => n.userId === currentUser.id ? { ...n, read: true } : n);
        updateNotifBadge();
        document.getElementById('mainContent').innerHTML = `<div class="section"><h2 style="font-size:1rem;"><i class="fas fa-bell"></i> УВЕДОМЛЕНИЯ</h2>${myNotifs.length ? myNotifs.map(n => `<div class="user-card"><strong style="color:#a86eff;">${n.title}</strong><br>${n.message}<br><small style="color:#8870aa;">${new Date(n.createdAt).toLocaleString()}</small></div>`).join('') : '<p style="color:#8870aa; font-weight:700;">НЕТ УВЕДОМЛЕНИЙ</p>'}<button class="btn" onclick="renderHome()">НА ГЛАВНУЮ</button></div>`;
    }
    
    function renderHome() {
        window.currentView = 'home';
        let visible = allPhotos.filter(p => p.status === 'approved');
        let countries = [...new Set(visible.map(p => p.loc?.country).filter(Boolean))];
        let models = [...new Set(visible.map(p => p.model || p.vehicle).filter(Boolean))];
        let timeline = [...visible].sort((a,b) => b.createdAt - a.createdAt).slice(0,5).map(p => ({ date: new Date(p.createdAt).toLocaleDateString(), text: `НОВОЕ ФОТО: ${p.vehicle}`, id: p.id }));
        let photographerStats = {};
        visible.forEach(p => { photographerStats[p.userId] = (photographerStats[p.userId] || 0) + 1; });
        let topPhotographers = Object.entries(photographerStats).sort((a,b) => b[1] - a[1]).slice(0,5).map(([userId, count]) => ({ user: users.find(u => u.id === userId), count }));
        let newThumbs = [...visible].sort((a,b) => b.createdAt - a.createdAt).slice(0,6);
        let sketchCount = allPhotos.filter(p => p.status === 'approved' && p.isSketch === true).length;
        
        let html = `
            <div class="section">
                <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;">
                    <button class="btn btn-primary" onclick="showSketchGallery()" style="font-size:0.8rem;"><i class="fas fa-paint-brush"></i> ФОТОЗАРИСОВКИ (${sketchCount})</button>
                    <button class="btn btn-purple" onclick="showRandomPhoto()" style="font-size:0.8rem;"><i class="fas fa-random"></i> СЛУЧАЙНОЕ ФОТО</button>
                    <button class="btn btn-gold" onclick="showModelStats()" style="font-size:0.8rem;"><i class="fas fa-chart-bar"></i> ТОП-МОДЕЛИ</button>
                </div>
            </div>
            <div class="section">

                    <input type="text" id="searchInput" placeholder="НАЗВАНИЕ, СТРАНА, ГОРОД..." style="padding:10px; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);" oninput="filterGallery()">
                    <select id="modelFilter" style="padding:10px; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);" onchange="filterGallery()">
                        <option value="">ВСЕ МОДЕЛИ</option>
                        ${models.map(m => `<option value="${escapeHtml(m)}">${m}</option>`).join('')}
                    </select>
                    <select id="countryFilter" style="padding:10px; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);" onchange="filterGallery()">
                        <option value="">ВСЕ СТРАНЫ</option>
                        ${countries.map(c => `<option value="${escapeHtml(c)}">${c}</option>`).join('')}
                    </select>
                    <select id="typeFilter" style="padding:10px; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);" onchange="filterGallery()">
                        <option value="all">ВСЕ ТИПЫ</option>
                        <option value="photo">ФОТО</option>
                        <option value="sketch">ФОТОЗАРИСОВКИ</option>
                    </select>
                </div>
                <div style="display:flex; gap:4px; flex-wrap:wrap; margin-top:6px;">
                    <span style="font-size:0.65rem; color:#8870aa; padding:4px 0; font-weight:700;">ПОПУЛЯРНЫЕ МОДЕЛИ:</span>
                    ${models.slice(0, 10).map(m => `<span class="model-filter-chip" onclick="document.getElementById('modelFilter').value='${escapeHtml(m)}'; filterGallery();">${m}</span>`).join('')}
                </div>
                <div id="galleryGrid" class="photo-grid" style="margin-top:12px;"></div>
            </div>
            <div class="main-two-columns">
                <div class="main-center">
                    <div class="section"><h3 style="font-size:0.95rem;"><i class="fas fa-globe"></i> СТРАНЫ</h3><div class="country-list">${countries.map(c => `<div class="country-item" onclick="showCountryPhotos('${escapeHtml(c)}')">${getFlag(c)} ${c} <span style="margin-left:auto; color:#8870aa; font-size:0.75rem; font-weight:700;">(${visible.filter(p=>p.loc?.country===c).length})</span></div>`).join('')}</div></div>
                </div>
                <div class="main-sidebar">
                    <div class="side-block"><h4><i class="fas fa-gavel"></i> ПРАВИЛА СООБЩЕСТВА</h4><div class="rules-text">
                        <p><span class="rule-num">1.</span> ЗАГРУЖАЙТЕ ТОЛЬКО СВОИ ФОТО ЖЕЛЕЗНОДОРОЖНОГО ТРАНСПОРТА.</p>
                        <p><span class="rule-num">2.</span> УКАЗЫВАЙТЕ ТОЧНОЕ МЕСТО СЪЁМКИ (СТРАНА, ГОРОД).</p>

    function showUploadForm() {
        window.currentView = 'upload';
        document.getElementById('mainContent').innerHTML = `<div class="section"><h2 style="font-size:1rem;"><i class="fas fa-cloud-upload-alt"></i> ЗАГРУЗКА ФОТО</h2>
            <div class="form-group"><label>ФАЙЛ</label><input type="file" id="uploadFile" accept="image/jpeg,image/png,image/webp"></div>

            <div class="form-group"><label>СТРАНА</label><input id="uploadCountry" placeholder="СТРАНА"></div>
            <div class="form-group"><label>ГОРОД</label><input id="uploadCity" placeholder="ГОРОД"></div>
            <div class="form-group"><label>УЛИЦА</label><input id="uploadStreet" placeholder="УЛИЦА"></div>
            <div class="form-group"><label>ТИП ФОТО</label><select id="uploadType"><option value="false">ОБЫЧНОЕ</option><option value="true">ФОТОЗАРИСОВКА</option></select></div>
            <div class="form-group"><label>ОТМЕТЬТЕ МЕСТО СЪЁМКИ НА КАРТЕ (КЛИКНИТЕ ПО КАРТЕ)</label>
                <div class="map-container" id="uploadMap" style="height:220px;"></div>
                <input type="hidden" id="uploadLat" value="0">
                <input type="hidden" id="uploadLng" value="0">
            </div>
            <button class="btn btn-success" onclick="doUpload()">ОТПРАВИТЬ НА МОДЕРАЦИЮ</button>
        </div>`;
        setTimeout(() => {
            try {
                const map = L.map('uploadMap').setView([55.76, 37.64], 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);
                let marker = null;
                map.on('click', function(e) {
                    if (marker) map.removeLayer(marker);
                    marker = L.marker(e.latlng).addTo(map);
                    document.getElementById('uploadLat').value = e.latlng.lat;
                    document.getElementById('uploadLng').value = e.latlng.lng;
                    showToast('КООРДИНАТЫ УСТАНОВЛЕНЫ');
                });
                setTimeout(() => map.invalidateSize(), 200);
            } catch(e) { console.error('ОШИБКА КАРТЫ ЗАГРУЗКИ:', e); }
        }, 200);
    }
    
    async function doUpload() {
        let file = document.getElementById('uploadFile').files[0];
        if (!file) { alert('ВЫБЕРИТЕ ФАЙЛ'); return; }
        let vehicle = document.getElementById('uploadVehicle').value.trim().toUpperCase();
        if (!vehicle) { alert('ВВЕДИТЕ НАЗВАНИЕ ТРАНСПОРТА'); return; }
        let model = document.getElementById('uploadModel').value.trim().toUpperCase() || vehicle;
        let lat = parseFloat(document.getElementById('uploadLat').value);
        let lng = parseFloat(document.getElementById('uploadLng').value);
        if (!lat || !lng) { alert('ОТМЕТЬТЕ МЕСТО СЪЁМКИ НА КАРТЕ'); return; }
        
        const btn = event.target;
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> ЗАГРУЗКА...';
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const newPhoto = {
                    id: 'p' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    userId: currentUser.id,
                    url: e.target.result,
                    thumb: e.target.result,
                    vehicle: vehicle,
                    model: model,
                    loc: {
                        country: document.getElementById('uploadCountry').value.toUpperCase(),
                        city: document.getElementById('uploadCity').value.toUpperCase(),
                        street: document.getElementById('uploadStreet').value.toUpperCase(),
                        lat: lat, lng: lng
                    },
                    status: 'pending',
                    rating: 0, likes: 0, dislikes: 0, views: 0,
                    createdAt: Date.now(),
                    moderationNote: '',
                    exif: {},
                    isSketch: document.getElementById('uploadType').value === 'true'
                };
                await putToStore('photos', newPhoto);
                allPhotos.push(newPhoto);
                if (!vehiclesProfiles[vehicle]) {
                    vehiclesProfiles[vehicle] = { vehicle: vehicle, model: model, year: '—', engine: '—', state: 'unknown', purpose: '—', company: '—', plate: '—', vin: '—', color: '—', mileage: '—' };
                    await putToStore('vehiclesProfiles', vehiclesProfiles[vehicle]);
                }
                let moderators = users.filter(u => u.role === 'admin' || u.role === 'moderator');
                for (let mod of moderators) {
                    await addNotification(mod.id, 'НОВОЕ ФОТО', `ПОЛЬЗОВАТЕЛЬ ${currentUser.name} ЗАГРУЗИЛ ${newPhoto.isSketch ? 'ФОТОЗАРИСОВКУ' : 'ФОТО'}: ${vehicle}`);
                }
                showToast('ФОТО ОТПРАВЛЕНО НА МОДЕРАЦИЮ');
                document.getElementById('uploadFile').value = '';
                document.getElementById('uploadVehicle').value = '';
                document.getElementById('uploadModel').value = '';
                document.getElementById('uploadCountry').value = '';
                document.getElementById('uploadCity').value = '';
                document.getElementById('uploadStreet').value = '';
                renderHome();
            } catch(err) { alert('ОШИБКА ПРИ ЗАГРУЗКЕ: ' + err.message); }
            finally { btn.disabled = false; btn.innerHTML = 'ОТПРАВИТЬ НА МОДЕРАЦИЮ'; }
        };
        reader.onerror = function() { 
            alert('ОШИБКА ЧТЕНИЯ ФАЙЛА'); 
            btn.disabled = false; 
            btn.innerHTML = 'ОТПРАВИТЬ НА МОДЕРАЦИЮ'; 
        };
        reader.readAsDataURL(file);
    }

            let content = document.getElementById('adminTabContent');
            if (tab === 'moderation') content.innerHTML = `<div class="photo-grid">${pending.map(p => photoCard(p, true)).join('') || '<div style="color:#8870aa; font-weight:700;">НЕТ ФОТО</div>'}</div>`;
            else if (tab === 'requests' && isFullAdmin) content.innerHTML = `<div>${pendingRequests.map(r => `<div class="user-card" style="flex-direction:column;"><div><strong style="color:#a86eff;">ТС:</strong> ${r.vehicleName}</div><div><strong style="color:#a86eff;">ПОЛЬЗОВАТЕЛЬ:</strong> ${r.userName}</div><div><strong style="color:#a86eff;">ОБОСНОВАНИЕ:</strong> ${r.reason || 'БЕЗ ПОЯСНЕНИЯ'}</div><div style="margin-top:6px; padding:6px; background:#0a0715; border:2px solid #3a1a6a; clip-path:polygon(0 0,100% 0,98% 100%,0 100%); font-size:0.8rem; color:#d4c8f0;">${Object.entries(r.changes).map(([k,v]) => `<div><strong style="color:#a86eff;">${k.toUpperCase()}:</strong> ${v || '—'}</div>`).join('')}</div><div style="margin-top:6px;"><button class="btn btn-success" onclick="approveEditRequest('${r.id}')">ОДОБРИТЬ</button><button class="btn btn-danger" onclick="rejectEditRequest('${r.id}')">ОТКЛОНИТЬ</button></div></div>`).join('') || '<div style="color:#8870aa; font-weight:700;">НЕТ ЗАЯВОК</div>'}</div>`;
            else if (tab === 'users' && isFullAdmin) content.innerHTML = users.map(u => `<div class="user-card"><div class="user-row"><i class="fas fa-user-circle" style="font-size:1.8rem; color:#a86eff;"></i><div><strong style="color:#d4c8f0;">${u.name}</strong><br><small style="color:#8870aa;">${u.email}</small><br><span style="font-size:0.75rem; color:#d4c8f0;">РОЛЬ: ${u.role === 'admin' ? 'АДМИН' : (u.role === 'moderator' ? 'МОДЕРАТОР' : 'ПОЛЬЗОВАТЕЛЬ')}</span><br><span style="font-size:0.75rem; color:#d4c8f0;">ГОЛОСОВАНИЕ: ${u.banVote ? 'ЗАПРЕЩЕНО' : 'РАЗРЕШЕНО'}</span><br><span style="font-size:0.75rem; color:#d4c8f0;">КОММЕНТАРИИ: ${u.banComment ? 'ЗАПРЕЩЕНЫ' : 'РАЗРЕШЕНЫ'}</span></div></div><div class="user-actions"><select id="role_${u.id}" style="padding:3px 8px; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.7rem; clip-path:polygon(0 0,100% 0,90% 100%,0 100%);"><option ${u.role === 'user' ? 'selected' : ''}>user</option><option ${u.role === 'moderator' ? 'selected' : ''}>moderator</option><option ${u.role === 'admin' ? 'selected' : ''}>admin</option></select><button class="btn" onclick="changeUserRole('${u.id}', document.getElementById('role_${u.id}').value)">СОХРАНИТЬ</button><button class="btn ${u.banVote ? 'btn-success' : 'btn-warning'}" onclick="toggleBanVote('${u.id}')">ГОЛОСОВАНИЕ</button><button class="btn ${u.banComment ? 'btn-success' : 'btn-warning'}" onclick="toggleBanComment('${u.id}')">КОММЕНТАРИИ</button>${u.id !== currentUser.id ? `<button class="btn btn-danger" onclick="deleteUser('${u.id}')">УДАЛИТЬ</button>` : ''}</div></div>`).join('');
            else if (tab === 'comments') {
                content.innerHTML = `<div>${comments.map(c => {
                    let photo = allPhotos.find(p => p.id === c.photoId);
                    let author = users.find(u => u.id === c.userId);
                    let canDelete = (currentUser.id === c.userId || canModerate(currentUser));
                    return `<div class="comment"><div><strong>${author?.name || '?'}</strong>: ${c.text} <br><small style="color:#8870aa; font-weight:700;">К ФОТО: ${photo?.vehicle || '?'}</small></div><div class="comment-actions">${canDelete ? `<button class="del-comment" onclick="deleteComment('${c.id}')"><i class="fas fa-trash-alt"></i></button>` : ''}</div></div>`;
                }).join('') || 'НЕТ КОММЕНТАРИЕВ'}</div>`;
            }
            else content.innerHTML = `<div class="photo-grid">${allPhotos.map(p => photoCard(p, false, true)).join('')}</div>`;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');
        };
        switchAdminTab('moderation');
    }
    
    async function changeUserRole(userId, newRole) { 
        let user = users.find(u => u.id === userId);
        if (user && canEditUsers(currentUser) && user.id !== currentUser.id) {
            user.role = newRole;
            await putToStore('users', user);
            showToast(`РОЛЬ ИЗМЕНЕНА НА ${newRole === 'admin' ? 'АДМИНИСТРАТОР' : (newRole === 'moderator' ? 'МОДЕРАТОР' : 'ПОЛЬЗОВАТЕЛЬ')}`);
            showAdminPanel();
        }
    }
    
    async function deleteUser(userId) { 
        if (!canEditUsers(currentUser)) return;
        if (userId === currentUser.id) { alert('НЕЛЬЗЯ УДАЛИТЬ СЕБЯ'); return; }
        if (confirm('УДАЛИТЬ ПОЛЬЗОВАТЕЛЯ И ВСЕ ЕГО ФОТО?')) {
            await deleteFromStore('users', userId);
            users = users.filter(u => u.id !== userId);
            const userPhotos = allPhotos.filter(p => p.userId === userId);
            for (const p of userPhotos) await deleteFromStore('photos', p.id);
            allPhotos = allPhotos.filter(p => p.userId !== userId);
            votes = votes.filter(v => v.userId !== userId);
            comments = comments.filter(c => c.userId !== userId);
            notifications = notifications.filter(n => n.userId !== userId);
            showToast('ПОЛЬЗОВАТЕЛЬ УДАЛЁН');
            showAdminPanel();
            renderHome();
        }
    }
    
    // ========== КАРТОЧКА ФОТО ==========
    function photoCard(photo, showModActions = false, isAdminView = false) {
        let author = users.find(u => u.id === photo.userId);
        let userVote = getUserVote(photo.id);
        let canVote = currentUser && canUserVote(currentUser);
        let modActions = '';
        if (showModActions && canModerate(currentUser) && photo.status === 'pending') {
            modActions = `<div style="margin-top:6px; display:flex; gap:4px; flex-wrap:wrap;"><button class="btn btn-success" onclick="event.stopPropagation(); moderatePhoto('${photo.id}', 'approved', '')">ОДОБРИТЬ</button><button class="btn btn-warning" onclick="event.stopPropagation(); showModerationNoteModal('${photo.id}', 'conditional')">УСЛОВНО</button><button class="btn btn-danger" onclick="event.stopPropagation(); showModerationNoteModal('${photo.id}', 'rejected')">ОТКЛОНИТЬ</button></div>`;
        }
        let adminActions = '';
        if ((isAdminView || showModActions) && canModerate(currentUser)) {
            adminActions = `<div style="margin-top:6px; display:flex; gap:4px; flex-wrap:wrap;"><button class="btn" onclick="event.stopPropagation(); editPhoto('${photo.id}')">РЕДАКТИРОВАТЬ</button><button class="btn btn-danger" onclick="event.stopPropagation(); deletePhoto('${photo.id}')">УДАЛИТЬ</button></div>`;
        }
        let modNoteHtml = '';
        if (photo.status === 'conditional' && photo.moderationNote) {
            modNoteHtml = `<div class="moderation-note">ЗАМЕЧАНИЕ МОДЕРАТОРА: ${escapeHtml(photo.moderationNote)}</div>`;
        }
        let mapLink = '';
        if (photo.loc && photo.loc.lat && photo.loc.lng) {
            mapLink = `<div class="map-pin" onclick="event.stopPropagation(); showMapForPhoto('${photo.id}')"><i class="fas fa-map-pin"></i> ПОКАЗАТЬ МЕСТО СЪЁМКИ</div>`;
        }
        let sketchTag = photo.isSketch ? '<span class="sketch-tag">ФОТОЗАРИСОВКА</span>' : '';
        let modelTag = photo.model ? `<span class="sketch-tag"><i class="fas fa-tag"></i> ${photo.model}</span>` : '';
        return `<div class="photo-card" onclick="showPhotoPage('${photo.id}')">
            <img src="${photo.thumb}" loading="lazy">
            <div class="photo-info">
                <div class="vehicle-name" onclick="event.stopPropagation(); showVehiclePage('${escapeHtml(photo.vehicle)}')">${photo.vehicle} ${sketchTag}</div>
                <div style="font-size:0.7rem; color:#8870aa; font-weight:600;">${modelTag}</div>
                <div style="font-size:0.8rem; color:#d4c8f0; font-weight:600;">${getFlag(photo.loc.country)} ${formatLoc(photo.loc)}</div>
                ${mapLink}
                ${modNoteHtml}
                <div class="photo-stats"><span>АВТОР: <span onclick="event.stopPropagation(); showUserProfile('${photo.userId}')" style="cursor:pointer; color:#a86eff;">${author?.name || '?'}</span></span><span>ПРОСМОТРОВ: ${photo.views || 0}</span><span>КОММЕНТАРИЕВ: ${comments.filter(c => c.photoId === photo.id).length}</span></div>
                <div class="vote-buttons">${currentUser ? (canVote ? `<button class="vote-btn vote-up ${userVote === 1 ? 'vote-active-up' : ''}" onclick="event.stopPropagation(); quickVote('${photo.id}', 1)"><i class="fas fa-plus"></i> ${photo.likes || 0}</button><button class="vote-btn vote-down ${userVote === -1 ? 'vote-active-down' : ''}" onclick="event.stopPropagation(); quickVote('${photo.id}', -1)"><i class="fas fa-minus"></i> ${photo.dislikes || 0}</button>` : `<span style="color:#ff0040; font-size:0.75rem; font-weight:700;">ГОЛОСОВАНИЕ ЗАПРЕЩЕНО</span>`) : `<span style="font-size:0.75rem; color:#8870aa; font-weight:700;">ВОЙДИТЕ ЧТОБЫ ГОЛОСОВАТЬ</span>`}</div>
                ${modActions}${adminActions}
            </div>
            <div class="status-badge ${getBadgeClass(photo.status)}">${getStatusText(photo.status)}</div>
        </div>`;
    }
    
    // ========== АВТОРИЗАЦИЯ ==========
    function showAuth() { document.getElementById('app').innerHTML = `<div style="max-width:380px; margin:40px auto; background:#0d0a1a; padding:24px 16px; border:3px solid #6b2fd0; clip-path:polygon(0 0,100% 0,98% 100%,0 100%); text-align:center; box-shadow:0 0 50px rgba(107,47,208,0.2);"><h2 style="font-size:1.2rem; color:#a86eff; text-shadow:0 0 30px rgba(168,110,255,0.3);">TRAIN SPOTTING SITE</h2><div style="background:#0a0715; padding:8px; border:2px solid #3a1a6a; clip-path:polygon(0 0,100% 0,98% 100%,0 100%); margin:12px 0; font-size:0.75rem; text-align:left; color:#8870aa; font-weight:600;"><div><strong style="color:#a86eff;">admin@trainspotting.com</strong> / admin123 (АДМИН)</div><div><strong style="color:#a86eff;">moder@trainspotting.com</strong> / moder123 (МОДЕРАТОР)</div><div><strong style="color:#a86eff;">demo@mail.ru</strong> / demo123 (ПОЛЬЗОВАТЕЛЬ)</div></div><input id="loginEmail" placeholder="EMAIL" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);"><input type="password" id="loginPassword" placeholder="ПАРОЛЬ" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);"><button class="btn btn-success" onclick="doLogin()" style="width:100%;">ВОЙТИ</button><div style="margin-top:12px; cursor:pointer; color:#a86eff; font-size:0.85rem; font-weight:700;" onclick="showRegisterForm()">РЕГИСТРАЦИЯ</div></div>`; }
    async function doLogin() { let email = document.getElementById('loginEmail').value, password = document.getElementById('loginPassword').value, user = users.find(u => u.email === email && u.password === password); if (user) { currentUser = JSON.parse(JSON.stringify(user)); delete currentUser.password; saveSession(); renderMainApp(); } else alert('НЕВЕРНЫЙ EMAIL ИЛИ ПАРОЛЬ'); }
    function showRegisterForm() { document.getElementById('app').innerHTML = `<div style="max-width:380px; margin:40px auto; background:#0d0a1a; padding:24px 16px; border:3px solid #6b2fd0; clip-path:polygon(0 0,100% 0,98% 100%,0 100%); box-shadow:0 0 50px rgba(107,47,208,0.2);"><h2 style="font-size:1.2rem; text-align:center; color:#a86eff; text-shadow:0 0 30px rgba(168,110,255,0.3);">РЕГИСТРАЦИЯ</h2><input id="regName" placeholder="ИМЯ" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);"><input id="regEmail" placeholder="EMAIL" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);"><input type="password" id="regPassword" placeholder="ПАРОЛЬ (МИН. 4)" style="width:100%; padding:10px; margin:8px 0; background:#0a0715; border:2px solid #3a1a6a; color:#d4c8f0; font-size:0.9rem; clip-path:polygon(0 0,100% 0,98% 100%,0 100%);"><button class="btn btn-success" onclick="doRegister()" style="width:100%;">ЗАРЕГИСТРИРОВАТЬСЯ</button><div style="margin-top:12px; text-align:center; cursor:pointer; color:#a86eff; font-size:0.85rem; font-weight:700;" onclick="showAuth()">ВОЙТИ</div></div>`; }
    async function doRegister() { let name = document.getElementById('regName').value.toUpperCase(), email = document.getElementById('regEmail').value, password = document.getElementById('regPassword').value; if (!name || !email || password.length < 4) { alert('ЗАПОЛНИТЕ ВСЕ ПОЛЯ'); return; } if (users.find(u => u.email === email)) { alert('EMAIL УЖЕ ИСПОЛЬЗУЕТСЯ'); return; } let newUser = { id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6), name, email, password, role: 'user', banVote: false, banComment: false, bio: '', city: '', website: '', telegram: '', createdAt: Date.now() }; await putToStore('users', newUser); users.push(newUser); alert('РЕГИСТРАЦИЯ УСПЕШНА!'); showAuth(); }
    function logout() { localStorage.removeItem('mss_user'); currentUser = null; showAuth(); }
    
    // ========== ГЛАВНАЯ РЕНДЕРИНГ ==========
    async function renderMainApp() {
        if (!currentUser) { showAuth(); return; }
        updateNotifBadge();
        let roleBadge = '';
        if (currentUser.role === 'admin') roleBadge = '<span class="admin-badge">ADMIN</span>';
        else if (currentUser.role === 'moderator') roleBadge = '<span class="moder-badge">MODERATOR</span>';
        let banInfo = (!canUserVote(currentUser) && currentUser.role !== 'admin') ? '<span class="banned-badge">ГОЛОСОВАНИЕ ЗАБЛОКИРОВАНО</span>' : '';
        document.getElementById('app').innerHTML = `<div class="header"><div class="logo-area" onclick="renderHome()"><i class="fas fa-train logo"></i><span class="site-title">TRAIN SPOTTING SITE</span></div><div class="user-info"><span><i class="fas fa-user"></i> ${currentUser.name}</span>${roleBadge}${banInfo}<button class="menu-btn" id="menuToggleBtn"><i class="fas fa-bars"></i><span id="notifBadge" class="notif-badge"></span></button></div></div><div class="side-menu" id="sideMenu"><div class="menu-header"><span>МЕНЮ</span><button id="closeMenuBtn" style="background:none;border:none;color:#a86eff;font-size:1.2rem;cursor:pointer;"><i class="fas fa-times"></i></button></div><ul class="menu-list"><li onclick="showUserProfile('${currentUser.id}')"><i class="fas fa-user"></i> ПРОФИЛЬ</li><li onclick="showStatistics()"><i class="fas fa-chart-line"></i> СТАТИСТИКА</li><li onclick="showUploadForm()"><i class="fas fa-upload"></i> ЗАГРУЗКА</li><li onclick="showJournal()"><i class="fas fa-history"></i> ЖУРНАЛ</li><li onclick="showMyPhotos()"><i class="fas fa-images"></i> МОИ ФОТО</li><li onclick="showSketchGallery()"><i class="fas fa-paint-brush"></i> ФОТОЗАРИСОВКИ</li><li onclick="showContest()"><i class="fas fa-trophy"></i> КОНКУРС</li><li onclick="showNotifications()"><i class="fas fa-bell"></i> УВЕДОМЛЕНИЯ</li><li onclick="showSwitchUserPanel()"><i class="fas fa-exchange-alt"></i> СМЕНИТЬ ПОЛЬЗОВАТЕЛЯ</li>${canModerate(currentUser) ? '<li onclick="showAdminPanel()"><i class="fas fa-cogs"></i> МОДЕРАЦИЯ</li>' : ''}<li onclick="logout()"><i class="fas fa-sign-out-alt"></i> ВЫХОД</li></ul></div><div class="container" id="mainContent"></div><div id="fullscreenViewer" class="fullscreen-viewer"></div>`;
        document.getElementById('menuToggleBtn').onclick = () => document.getElementById('sideMenu').classList.add('open');
        document.getElementById('closeMenuBtn').onclick = () => document.getElementById('sideMenu').classList.remove('open');
        renderHome();
    }
    
    // ========== ЗАПУСК ==========
    (async function() {
        document.getElementById('app').innerHTML = '<div class="loading-overlay"><div class="loading-spinner"></div><div>ЗАГРУЗКА ДАННЫХ...</div></div>';
        try {
            await initDB();
            await loadAllData();
            renderMainApp();
        } catch(e) {
            console.error('ОШИБКА ЗАПУСКА:', e);
            document.getElementById('app').innerHTML = '<div style="padding:30px;text-align:center;color:#ff0040;font-weight:900;">ОШИБКА ЗАГРУЗКИ ПРИЛОЖЕНИЯ. ПОПРОБУЙТЕ ОБНОВИТЬ СТРАНИЦУ.</div>';
        }
    })();
    
    // Глобальные функции
    window.quickVote = quickVote; window.moderatePhoto = moderatePhoto; window.changeUserRole = changeUserRole; window.deleteUser = deleteUser;
    window.showCityPhotos = showCityPhotos; window.showCountryPhotos = showCountryPhotos; window.showVehiclePage = showVehiclePage;
    window.showUserProfile = showUserProfile; window.renderHome = renderHome; window.showUploadForm = showUploadForm; window.doUpload = doUpload;
    window.showAdminPanel = showAdminPanel; window.showJournal = showJournal; window.showMyPhotos = showMyPhotos; window.showStatistics = showStatistics;
    window.showContest = showContest; window.showNotifications = showNotifications; window.showSwitchUserPanel = showSwitchUserPanel;
    window.switchToUser = switchToUser; window.logout = logout; window.doLogin = doLogin; window.doRegister = doRegister;
    window.showAuth = showAuth; window.showRegisterForm = showRegisterForm; window.filterGallery = filterGallery;
    window.editPhoto = editPhoto; window.deletePhoto = deletePhoto; window.editVehicleProfile = editVehicleProfile;
    window.requestVehicleEdit = requestVehicleEdit; window.approveEditRequest = approveEditRequest; window.rejectEditRequest = rejectEditRequest;
    window.toggleBanVote = toggleBanVote; window.toggleBanComment = toggleBanComment;
    window.editProfile = editProfile; window.showMapForPhoto = showMapForPhoto; window.deleteComment = deleteComment;
    window.showPhotoPage = showPhotoPage; window.toggleCollapse = toggleCollapse; window.addPhotoPageComment = addPhotoPageComment;
    window.showSketchGallery = showSketchGallery; window.showRandomPhoto = showRandomPhoto; window.showModelStats = showModelStats;
</script>
</body>
</html>
